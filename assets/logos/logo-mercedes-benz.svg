<svg viewBox="0 0 210 35" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Ring with bevel effect -->
  <circle cx="15" cy="15" r="12" stroke="currentColor" stroke-width="0.8" fill="none"/>
  
  <!-- 3D Beveled Three-Pointed Star -->
  <!-- Top Spoke -->
  <polygon points="15,15 15,4.2 13.96,14.4" fill="currentColor" fill-opacity="0.95"/>
  <polygon points="15,15 15,4.2 16.04,14.4" fill="currentColor" fill-opacity="0.4"/>
  <!-- Bottom Right Spoke -->
  <polygon points="15,15 24.35,20.4 16.04,14.4" fill="currentColor" fill-opacity="0.95"/>
  <polygon points="15,15 24.35,20.4 15,16.2" fill="currentColor" fill-opacity="0.4"/>
  <!-- Bottom Left Spoke -->
  <polygon points="15,15 5.65,20.4 15,16.2" fill="currentColor" fill-opacity="0.95"/>
  <polygon points="15,15 5.65,20.4 13.96,14.4" fill="currentColor" fill-opacity="0.4"/>
  
  <!-- Serif Wordmark matching the uploaded image -->
  <text x="38" y="20" font-family="'Georgia', 'Times New Roman', 'Times', 'Didot', serif" font-size="14.5" fill="currentColor" letter-spacing="0.04em" font-weight="normal">Mercedes-Benz</text>
</svg>
